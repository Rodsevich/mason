name: masonex
environment:
  sdk: ">=3.11.1 <4.0.0"
dev_dependencies:
  melos: ^7.4.1

melos:
  packages:
    - packages/*

  scripts:
    publish:masonex:
      run: melos publish --dry-run --scope="masonex" --scope="mustachex"
      description: |
        Publish the masonex and or mustachex packages.