name: taskflow_in_file_generation_example
description: Demonstrates masonex in-file generation annotations.
publish_to: none
version: 0.0.0

environment:
  sdk: ^3.5.4

dependencies:
  masonex: any

dev_dependencies:
  build_runner: ^2.4.12

dependency_overrides:
  mason_api:
    path: ../../../packages/mason_api
  mason_logger:
    path: ../../../packages/mason_logger
  masonex:
    path: ../../../packages/masonex
  mustachex:
    path: ../../../packages/mustachex
