name: taskflow_programmatic_example
description: Drive masonex from a plain Dart binary, no CLI involved.
publish_to: none
version: 0.0.0

environment:
  sdk: ^3.5.4

dependencies:
  masonex: any

dependency_overrides:
  mason_api:
    path: ../../../packages/mason_api
  mason_logger:
    path: ../../../packages/mason_logger
  masonex:
    path: ../../../packages/masonex
  mustachex:
    path: ../../../packages/mustachex
